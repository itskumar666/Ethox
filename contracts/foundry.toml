[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc-version = "0.8.24"
optimizer = true
optimizer-runs = 200

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@safe/=lib/safe-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 1000

[profile.ci]
fuzz = { runs = 5000 }

